container:
  image: ubuntu:22.04
  cpu: 8
  memory: 32G

timeout_in: 120m

# Inputs — override these from the Cirrus web UI when you re-run a task.
env:
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE: "https://github.com/mkvenompro/recovery_device_xiaomi_spinel"
  DEVICE_TREE_BRANCH: "android-12.1"
  BUILD_TARGET: "vendorboot"
  PATCH_RAMDISK: "true"
  STOCK_VENDOR_BOOT_URL: ""
  GOFILE_UPLOAD: "false"
  LDCHECK: "false"
  LDCHECKPATH: "system/bin/qseecomd"
  RUN_BUILD: "false"

# Build on push to main, on PRs, or when RUN_BUILD=true (UI rerun override).
only_if: $CIRRUS_BRANCH == 'main' || $CIRRUS_PR != '' || $RUN_BUILD == 'true'

task:
  name: TWRP Build ($DEVICE_TREE_BRANCH / $BUILD_TARGET)

  cache:
    folder: $HOME/.ccache
    fingerprint_key: "ccache-{{ .Branch }}-{{ .Env.MANIFEST_BRANCH }}"

  setup_script:
    - echo "Manifest Branch: $MANIFEST_BRANCH"
    - echo "Device Tree: $DEVICE_TREE"
    - echo "Device Branch: $DEVICE_TREE_BRANCH"
    - echo "Build Target: ${BUILD_TARGET}image"
    - echo "PATCH_RAMDISK: $PATCH_RAMDISK"
    - echo "GOFILE_UPLOAD: $GOFILE_UPLOAD"
    - sudo fallocate -l 12G /swapfile 2>/dev/null || true
    - sudo chmod 600 /swapfile 2>/dev/null || true
    - sudo mkswap /swapfile 2>/dev/null || true
    - sudo swapon /swapfile 2>/dev/null || true

  prepare_script:
    - |
      cd $CIRRUS_WORKING_DIR
      sudo apt-get update
      sudo apt-get -y upgrade
      sudo apt-get -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev libncurses5 python3 curl git repo aria2 unzip openjdk-8-jdk
      export PATH=~/bin:$PATH
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod a+x ~/bin/repo
      rm -f build_env.sh
      mkdir -p android-recovery && cd android-recovery
      git config --global user.name "cirrus"
      git config --global user.email "cirrus@cirrus-ci.com"
      if [ "$MANIFEST_BRANCH" = "twrp-11" ] || [ "$MANIFEST_BRANCH" = "twrp-12.1" ] || [ "$MANIFEST_BRANCH" = "twrp-14.1" ]; then
        MANIFEST=https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
        CHECK_LEGACY_BRANCH=false
      else
        MANIFEST=https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git
        CHECK_LEGACY_BRANCH=true
      fi
      echo "MANIFEST=$MANIFEST" >> $CIRRUS_WORKING_DIR/build_env.sh
      echo "CHECK_LEGACY_BRANCH=$CHECK_LEGACY_BRANCH" >> $CIRRUS_WORKING_DIR/build_env.sh
      repo init --depth=1 -u $MANIFEST -b $MANIFEST_BRANCH
      repo sync -j$(nproc --all) --force-sync
      if [ "$MANIFEST_BRANCH" = "twrp-14.1" ]; then
        if [ -f external/guava/Android.bp ] && grep -q 'name:[[:space:]]*"guava"' external/guava/Android.bp; then
          echo "guava already present"
        else
          rm -rf external/guava
          git clone --depth=1 https://android.googlesource.com/platform/external/guava external/guava
        fi
      fi
      rm -rf external/scrypt
      git clone --depth=1 https://android.googlesource.com/platform/external/scrypt external/scrypt
      DT=$(echo "$DEVICE_TREE" | sed 's#https://##')
      if [ -n "$RECOVERY_TOKEN" ]; then
        git clone "https://${RECOVERY_USERNAME}:${RECOVERY_TOKEN}@${DT}" -b "$DEVICE_TREE_BRANCH" ./device_tree
      else
        git clone "https://${DT}" -b "$DEVICE_TREE_BRANCH" ./device_tree
      fi
      cd device_tree && echo "COMMIT_ID=$(git rev-parse HEAD)" >> $CIRRUS_WORKING_DIR/build_env.sh && cd ..
      DEVICE_MAKEFILE=""; DEVICE_DIRECTORY=""; DEVICE_NAME=""
      cd device_tree
      for file in *.mk; do
        makefile=$(sed -n 's/^[[:space:]]*PRODUCT_NAME[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
        brand=$(sed -n 's/^[[:space:]]*PRODUCT_BRAND[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
        codename=$(sed -n 's/^[[:space:]]*PRODUCT_DEVICE[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
        if [ -n "$makefile" ] && [ -n "$brand" ] && [ -n "$codename" ]; then
          DEVICE_MAKEFILE="$makefile"; DEVICE_DIRECTORY="device/$brand"; DEVICE_NAME="$codename"
          break
        fi
      done
      cd ..
      mkdir -p "$DEVICE_DIRECTORY"
      mv device_tree "$DEVICE_DIRECTORY"/"$DEVICE_NAME"
      RAMDISK_PATH="${CIRRUS_WORKING_DIR}/android-recovery/${DEVICE_DIRECTORY}/${DEVICE_NAME}/prebuilt/platform_ramdisk.cpio.lz4"
      {
        echo "DEVICE_MAKEFILE=$DEVICE_MAKEFILE"
        echo "DEVICE_NAME=$DEVICE_NAME"
        echo "DEVICE_DIRECTORY=$DEVICE_DIRECTORY"
        echo "STOCK_RAMDISK_PATH=$RAMDISK_PATH"
      } >> $CIRRUS_WORKING_DIR/build_env.sh

  build_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      cd android-recovery
      source build/envsetup.sh
      export ALLOW_MISSING_DEPENDENCIES=true
      export USE_CCACHE=1
      export CCACHE_DIR=$HOME/.ccache
      if [ "$MANIFEST_BRANCH" = "twrp-14.1" ]; then
        lunch ${DEVICE_MAKEFILE}-ap2a-eng && make clean && make ${BUILD_TARGET}image -j$(nproc --all)
      else
        lunch ${DEVICE_MAKEFILE}-eng && make clean && make ${BUILD_TARGET}image -j$(nproc --all)
      fi

  find_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      OUTDIR=${CIRRUS_WORKING_DIR}/android-recovery/out/target/product/${DEVICE_NAME}
      echo "OUT_DIR=${OUTDIR}" >> build_env.sh
      IMGS=""
      for pattern in "vendor_boot.img" "recovery.img" "boot.img"; do
        for f in $(find "$OUTDIR" -maxdepth 2 -name "$pattern" -type f 2>/dev/null); do
          IMGS="$IMGS $f"
        done
      done
      if [ -z "$IMGS" ]; then
        for f in $(find "$OUTDIR" -maxdepth 3 -name "*.img" -type f 2>/dev/null); do
          IMGS="$IMGS $f"
        done
      fi
      echo "FOUND_IMGS=${IMGS}" >> build_env.sh
      if [ "$BUILD_TARGET" = "recovery" ]; then BUILD_TARGET_NAME=recovery
      elif [ "$BUILD_TARGET" = "boot" ]; then BUILD_TARGET_NAME=boot
      else BUILD_TARGET_NAME=vendor_boot; fi
      echo "BUILD_TARGET_NAME=$BUILD_TARGET_NAME" >> build_env.sh
      echo "BUILD_DATE=$(date +%Y%m%d)" >> build_env.sh

  patch_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      if [ "$PATCH_RAMDISK" != "true" ]; then echo "PATCH_RAMDISK disabled, skipping"; exit 0; fi
      OUTDIR=${CIRRUS_WORKING_DIR}/android-recovery/out/target/product/${DEVICE_NAME}
      if [ -f "${CIRRUS_WORKING_DIR}/vendor_boot.img" ]; then
        STOCK_VENDOR_BOOT_PATH=${CIRRUS_WORKING_DIR}/vendor_boot.img
      elif [ -n "$STOCK_VENDOR_BOOT_URL" ]; then
        mkdir -p /tmp/stock
        aria2c -x 4 -s 4 "$STOCK_VENDOR_BOOT_URL" -d /tmp/stock -o vendor_boot.img
        STOCK_VENDOR_BOOT_PATH=/tmp/stock/vendor_boot.img
      else
        echo "No vendor_boot found and no STOCK_VENDOR_BOOT_URL. Aborting patch."; exit 1
      fi
      echo "STOCK_VENDOR_BOOT_PATH=${STOCK_VENDOR_BOOT_PATH}" >> build_env.sh
      mkdir -p /tmp/magisk
      curl -sL -o /tmp/magisk/Magisk.apk https://github.com/topjohnwu/Magisk/releases/download/v28.0/Magisk-v28.0.apk
      unzip -j /tmp/magisk/Magisk.apk lib/x86_64/libmagiskboot.so -d /tmp/magisk/
      mv /tmp/magisk/libmagiskboot.so /tmp/magisk/magiskboot
      chmod +x /tmp/magisk/magiskboot
      MAGISKBOOT=/tmp/magisk/magiskboot
      BUILT_VB=""
      for f in "$OUTDIR/vendor_boot.img" "$OUTDIR/recovery.img"; do
        [ -f "$f" ] && { BUILT_VB="$f"; break; }
      done
      if [ -f "$STOCK_VENDOR_BOOT_PATH" ] && [ -f "$STOCK_RAMDISK_PATH" ] && [ -n "$BUILT_VB" ]; then
        WORK=$(mktemp -d /tmp/vb_patch_XXXXXX)
        mkdir -p "$WORK/built" "$WORK/stock"
        ( cd "$WORK/built" && $MAGISKBOOT unpack "$BUILT_VB" )
        RECOVERY=""
        for f in vendor_ramdisk/recovery.cpio vendor_ramdisk/recovery.cpio.gz vendor_ramdisk/recovery.cpio.lz4; do
          [ -f "$WORK/built/$f" ] && { RECOVERY="$WORK/built/$f"; break; }
        done
        ( cd "$WORK/stock" && $MAGISKBOOT unpack "$STOCK_VENDOR_BOOT_PATH" )
        if [ -f "$WORK/stock/vendor_ramdisk/ramdisk.cpio.lz4" ]; then
          cp "$STOCK_RAMDISK_PATH" "$WORK/stock/vendor_ramdisk/ramdisk.cpio.lz4"
        elif [ -f "$WORK/stock/vendor_ramdisk/ramdisk.cpio" ]; then
          $MAGISKBOOT decompress lz4 "$STOCK_RAMDISK_PATH" "$WORK/stock/vendor_ramdisk/ramdisk.cpio" 2>/dev/null || cp "$STOCK_RAMDISK_PATH" "$WORK/stock/vendor_ramdisk/ramdisk.cpio"
        fi
        [ -n "$RECOVERY" ] && cp "$RECOVERY" "$WORK/stock/vendor_ramdisk/recovery.cpio"
        ( cd "$WORK/stock" && $MAGISKBOOT repack "$STOCK_VENDOR_BOOT_PATH" "$OUTDIR/vendor_boot_patched.img" )
        echo "PATCHED_VB=$OUTDIR/vendor_boot_patched.img" >> build_env.sh
        rm -rf "$WORK"
      fi

  release_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      if [ -z "$RECOVERY_TOKEN" ]; then echo "RECOVERY_TOKEN not set; skipping release upload"; exit 0; fi
      cd /tmp
      curl -sL https://github.com/cli/cli/releases/download/v2.40.0/gh_2.40.0_linux_amd64.tar.gz | tar xz
      export PATH=/tmp/gh_2.40.0_linux_amd64/bin:$PATH
      echo "$RECOVERY_TOKEN" | gh auth login --with-token
      OUTDIR=${CIRRUS_WORKING_DIR}/android-recovery/out/target/product/${DEVICE_NAME}
      FILES=""
      [ -f "$OUTDIR/${BUILD_TARGET_NAME}.img" ] && FILES="$FILES $OUTDIR/${BUILD_TARGET_NAME}.img"
      for z in "$OUTDIR"/*installer*zip; do [ -f "$z" ] && FILES="$FILES $z"; done
      [ -f "$OUTDIR/vendor_boot_patched.img" ] && FILES="$FILES $OUTDIR/vendor_boot_patched.img"
      [ -f "$OUTDIR/ramdisk-recovery.cpio" ] && FILES="$FILES $OUTDIR/ramdisk-recovery.cpio"
      [ -f "$OUTDIR/ramdisk-recovery.cpio.gz" ] && FILES="$FILES $OUTDIR/ramdisk-recovery.cpio.gz"
      printf 'Build: %s\nDevice: %s/tree/%s\nCommit: %s/commit/%s\nPATCH_RAMDISK: %s' "$MANIFEST_BRANCH" "$DEVICE_TREE" "$DEVICE_TREE_BRANCH" "$DEVICE_TREE" "$COMMIT_ID" "$PATCH_RAMDISK" > /tmp/notes.txt
      gh release create "${CIRRUS_BUILD_ID}" --repo "${CIRRUS_REPO_OWNER}/${CIRRUS_REPO_NAME}" --title "Unofficial TWRP for ${DEVICE_NAME} // ${BUILD_DATE}" --notes-file /tmp/notes.txt $FILES

  gofile_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      if [ "$GOFILE_UPLOAD" != "true" ]; then echo "GOFILE_UPLOAD disabled, skipping"; exit 0; fi
      for f in $FOUND_IMGS; do
        [ -f "$f" ] || continue
        fname=$(basename "$f")
        server=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null || echo "store9")
        curl -s -F "file=@$f" "https://$server.gofile.io/uploadFile"
      done
      [ -f "$PATCHED_VB" ] && curl -s -F "file=@$PATCHED_VB" "https://store9.gofile.io/uploadFile"

  ldcheck_script:
    - |
      cd $CIRRUS_WORKING_DIR
      set -a; source build_env.sh; set +a
      if [ "$LDCHECK" != "true" ]; then echo "LDCHECK disabled, skipping"; exit 0; fi
      OUTDIR=${CIRRUS_WORKING_DIR}/android-recovery/out/target/product/${DEVICE_NAME}
      mv -n tools/ldcheck "$OUTDIR/recovery/root/" 2>/dev/null || true
      mv -n tools/libneeds "$OUTDIR/recovery/root/" 2>/dev/null || true
      cd "$OUTDIR/recovery/root"
      python3 ldcheck -p system/lib64:vendor/lib64:system/lib:vendor/lib -d $LDCHECKPATH || true
