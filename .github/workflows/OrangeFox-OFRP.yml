name: OrangeFox [OFRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: ''
        type: choice
        options:
        - 14.1
        - 12.1
        - 11.0
        - 10.0
        - 9.0
        - 8.1
        - 7.1
        - 6.0
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/YFMARCO-Dev/recovery_device_tree'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'fox_14.1'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      PATCH_RAMDISK:
        description: 'Patch vendor_boot with stock ramdisk (needs prebuilt/platform_ramdisk.cpio.lz4 in device tree)'
        required: false
        default: false
        type: boolean
      STOCK_VENDOR_BOOT_URL:
        description: 'URL to stock vendor_boot.img (required if PATCH_RAMDISK=true)'
        required: false
        default: ''
      GOFILE_UPLOAD:
        description: 'Upload results to gofile.io'
        required: false
        default: false
        type: boolean
      LDCHECK:
        description: 'Use LDCHECK'
        required: false
        default: false
        type: boolean
      LDCHECKPATH:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Display Inputs
      run: |
        echo "Displaying variables/inputs."
        echo "Manifest Branch: ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target: ${{ inputs.BUILD_TARGET }}image"
        echo "PATCH_RAMDISK: ${{ inputs.PATCH_RAMDISK }}"
        echo "GOFILE_UPLOAD: ${{ inputs.GOFILE_UPLOAD }}"
              
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
      
    - name: Build Environment
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        if [ ${{ inputs.MANIFEST_BRANCH }} == '11.0' ] || [ ${{ inputs.MANIFEST_BRANCH }} == '12.1' ] || [ ${{ inputs.MANIFEST_BRANCH }} == '14.1' ]; then
            echo "Sync fox_${{ inputs.MANIFEST_BRANCH }} branch"
            echo "CHECK_LEGACY_BRANCH=false" >> $GITHUB_ENV
            cd sync
            ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        else
            echo "Sync legacy fox_${{ inputs.MANIFEST_BRANCH }} branch"
            echo "CHECK_LEGACY_BRANCH=true" >> $GITHUB_ENV
            cd sync/legacy
            ./orangefox_sync_legacy.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        fi

    - name: Ensure Guava dependency exists
      if: inputs.MANIFEST_BRANCH == '14.1'
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        if [ -f external/guava/Android.bp ] && grep -q 'name:[[:space:]]*"guava"' external/guava/Android.bp; then
          echo "guava module is already available."
        else
          echo "guava module missing after sync. Cloning fallback project..."
          rm -rf external/guava
          git clone --depth=1 https://android.googlesource.com/platform/external/guava external/guava
        fi

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone https://$(echo "${{ secrets.RECOVERY_USERNAME }}" | sed 's/@/%40/'):${{ secrets.RECOVERY_TOKEN }}@$(echo "${{ inputs.DEVICE_TREE }}" | sed 's~https://~~') -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        cd device_tree
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Extracting variables from .mk file
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/device_tree
        DEVICE_MAKEFILE=""
        DEVICE_DIRECTORY=""
        DEVICE_NAME=""
        for file in *.mk; do
            makefile=$(sed -n 's/^[[:space:]]*PRODUCT_NAME[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
            brand=$(sed -n 's/^[[:space:]]*PRODUCT_BRAND[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
            codename=$(sed -n 's/^[[:space:]]*PRODUCT_DEVICE[[:space:]]*:=\s*\(.*\)/\1/p' "$file")
            if [[ -n "$makefile" && -n "$brand" && -n "$codename" ]]; then
                DEVICE_MAKEFILE="$makefile"
                DEVICE_DIRECTORY="device/$brand"
                DEVICE_NAME="$codename"
                echo "DEVICE_MAKEFILE=${DEVICE_MAKEFILE}" >> $GITHUB_ENV
                echo "DEVICE_NAME=${DEVICE_NAME}" >> $GITHUB_ENV
                echo "DEVICE_DIRECTORY=${DEVICE_DIRECTORY}" >> $GITHUB_ENV
                break
            fi
        done
        cd ../
        mkdir -p "$DEVICE_DIRECTORY"
        mv device_tree "$DEVICE_DIRECTORY"/"$DEVICE_NAME"
        RAMDISK_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/${DEVICE_DIRECTORY}/${DEVICE_NAME}/prebuilt/platform_ramdisk.cpio.lz4"
        echo "STOCK_RAMDISK_PATH=${RAMDISK_PATH}" >> $GITHUB_ENV

    - name: Installing python2 for legacy builds
      if: env.CHECK_LEGACY_BRANCH == 'true'
      run: |
        sudo apt-get install python2 python-is-python2

    - name: Get stock vendor_boot (from repo root or download)
      if: ${{ inputs.PATCH_RAMDISK }}
      run: |
        if [ -f "${GITHUB_WORKSPACE}/vendor_boot.img" ]; then
          echo "Using vendor_boot.img from repo root"
          echo "STOCK_VENDOR_BOOT_PATH=${GITHUB_WORKSPACE}/vendor_boot.img" >> $GITHUB_ENV
        elif [ -n "${{ inputs.STOCK_VENDOR_BOOT_URL }}" ]; then
          URL="${{ inputs.STOCK_VENDOR_BOOT_URL }}"
          echo "Downloading stock vendor_boot from $URL"
          mkdir -p /tmp/stock
          aria2c -x 4 -s 4 "$URL" -d /tmp/stock -o vendor_boot.img
          echo "STOCK_VENDOR_BOOT_PATH=/tmp/stock/vendor_boot.img" >> $GITHUB_ENV
        else
          echo "No vendor_boot.img found in repo root and no STOCK_VENDOR_BOOT_URL provided. Skipping patch."
          exit 1
        fi

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        if [ ${{ inputs.MANIFEST_BRANCH }} == '14.1' ]; then
            lunch twrp_${{ env.DEVICE_NAME }}-ap2a-eng && make clean && mka adbd ${{ inputs.BUILD_TARGET }}image
        elif [ ${{ inputs.MANIFEST_BRANCH }} == '11.0' ] || [ ${{ inputs.MANIFEST_BRANCH }} == '12.1' ]; then
            lunch twrp_${{ env.DEVICE_NAME }}-eng && make clean && mka adbd ${{ inputs.BUILD_TARGET }}image
        else
            lunch omni_${{ env.DEVICE_NAME }}-eng && make clean && mka ${{ inputs.BUILD_TARGET }}image
        fi

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Manila date +%Y%m%d)" >> $GITHUB_ENV

    - name: Find built images
      id: find_imgs
      run: |
        OUTDIR=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}
        echo "OUT_DIR=${OUTDIR}" >> $GITHUB_ENV
        IMGS=""
        for pattern in "OrangeFox-*.img" "vendor_boot.img" "recovery.img" "boot.img"; do
          for f in $(find "$OUTDIR" -maxdepth 2 -name "$pattern" -type f 2>/dev/null); do
            IMGS="$IMGS $f"
          done
        done
        if [ -z "$IMGS" ]; then
          for f in $(find "$OUTDIR" -maxdepth 3 -name "*.img" -type f 2>/dev/null); do
            IMGS="$IMGS $f"
          done
        fi
        echo "FOUND_IMGS=${IMGS}" >> $GITHUB_ENV

    - name: Check if Recovery Exist
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        OUTDIR="out/target/product/${{ env.DEVICE_NAME }}"
        IMG_FOUND=false
        ZIP_FOUND=false
        for pattern in "OrangeFox-*.img" "vendor_boot.img" "recovery.img" "boot.img"; do
          for f in $(find "$OUTDIR" -maxdepth 2 -name "$pattern" -type f 2>/dev/null); do
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum "$f" | cut -d ' ' -f 1)" >> $GITHUB_ENV
            echo "RELEASE_IMG=$f" >> $GITHUB_ENV
            IMG_FOUND=true
            break
          done
          $IMG_FOUND && break
        done
        $IMG_FOUND || echo "No image found in $OUTDIR"
        for pattern in "OrangeFox*.zip" "*installer*.zip" "recovery*.zip"; do
          for f in $(find "$OUTDIR" -maxdepth 2 -name "$pattern" -type f 2>/dev/null); do
            echo "CHECK_ZIP_IS_OK=true" >> $GITHUB_ENV
            echo "MD5_ZIP=$(md5sum "$f" | cut -d ' ' -f 1)" >> $GITHUB_ENV
            echo "RELEASE_ZIP=$f" >> $GITHUB_ENV
            ZIP_FOUND=true
            break
          done
          $ZIP_FOUND && break
        done
        $ZIP_FOUND || echo "No zip found in $OUTDIR"

    - name: Patch vendor_boot with stock ramdisk
      if: ${{ inputs.PATCH_RAMDISK && env.STOCK_VENDOR_BOOT_PATH != '' }}
      continue-on-error: true
      run: |
        OUTDIR=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}
        STOCK_VB="${{ env.STOCK_VENDOR_BOOT_PATH }}"
        STOCK_RAMDISK="${{ env.STOCK_RAMDISK_PATH }}"
        mkdir -p /tmp/magisk
        curl -sL -o /tmp/magisk/magisk.apk https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
        unzip -j -o /tmp/magisk/magisk.apk "lib/x86_64/libmagiskboot.so" -d /tmp/magisk/ 2>/dev/null || \
          unzip -j -o /tmp/magisk/magisk.apk "lib/x86/libmagiskboot.so" -d /tmp/magisk/
        mv /tmp/magisk/libmagiskboot.so /tmp/magisk/magiskboot
        chmod +x /tmp/magisk/magiskboot
        MAGISKBOOT=/tmp/magisk/magiskboot

        if [ ! -f "$STOCK_VB" ]; then
          echo "Stock vendor_boot not found at: $STOCK_VB"
          exit 1
        fi
        if [ ! -f "$STOCK_RAMDISK" ]; then
          echo "Stock platform ramdisk not found at: $STOCK_RAMDISK"
          exit 1
        fi

        RECOVERY_CPIO=$(find "$OUTDIR" -maxdepth 2 -name "ramdisk-recovery.cpio*" -type f | head -1)
        if [ -z "$RECOVERY_CPIO" ]; then
          echo "No standalone ramdisk-recovery.cpio, extracting from built vendor_boot"
          BUILT_VB=""
          for f in "$OUTDIR/OrangeFox-"*.img "$OUTDIR/vendor_boot.img"; do
            [ -f "$f" ] && { BUILT_VB="$f"; break; }
          done
          if [ -z "$BUILT_VB" ]; then
            echo "No built OrangeFox img or vendor_boot.img found"
            exit 1
          fi
        fi

        WORK=$(mktemp -d /tmp/vb_patch_XXXXXX)
        mkdir -p "$WORK/stock"

        echo "== Unpacking STOCK vendor_boot =="
        (cd "$WORK/stock" && $MAGISKBOOT unpack "$STOCK_VB") 2>&1
        echo "== Stock files =="
        find "$WORK/stock" -maxdepth 2 -type f | sort

        mkdir -p /tmp/patch
        $MAGISKBOOT decompress lz4 "$STOCK_RAMDISK" /tmp/patch/platform.cpio 2>/dev/null || cp "$STOCK_RAMDISK" /tmp/patch/platform.cpio

        if [ -n "$RECOVERY_CPIO" ]; then
          $MAGISKBOOT decompress lz4 "$RECOVERY_CPIO" /tmp/patch/recovery.cpio 2>/dev/null || cp "$RECOVERY_CPIO" /tmp/patch/recovery.cpio
          echo "Using standalone ramdisk-recovery.cpio"
        else
          mkdir -p "$WORK/built"
          (cd "$WORK/built" && $MAGISKBOOT unpack "$BUILT_VB") 2>&1
          RECOVERY=$(find "$WORK/built" -maxdepth 2 -iname "*recovery*cpio*" -o -name "ramdisk.cpio" | head -1)
          if [ -z "$RECOVERY" ]; then
            echo "Could not locate any recovery cpio in built image"
            exit 1
          fi
          cp "$RECOVERY" /tmp/patch/recovery.cpio
          echo "Using recovery from built image: $RECOVERY"
        fi

        STOCK_CPIO=$(find "$WORK/stock" -maxdepth 2 -name "ramdisk.cpio" -type f | head -1)
        STOCK_VENDOR_RAMDISK="$WORK/stock/vendor_ramdisk"
        if [ -d "$STOCK_VENDOR_RAMDISK" ]; then
          echo "stock has vendor_ramdisk/ directory"
          TARGET=$(find "$STOCK_VENDOR_RAMDISK" -maxdepth 1 -iname "*recovery*cpio*" | head -1)
          [ -n "$TARGET" ] && cp /tmp/patch/recovery.cpio "$TARGET"
          TARGET=$(find "$STOCK_VENDOR_RAMDISK" -maxdepth 1 -iname "*ramdisk*cpio*" ! -iname "*recovery*" | head -1)
          [ -n "$TARGET" ] && cp /tmp/patch/platform.cpio "$TARGET"
        elif [ -n "$STOCK_CPIO" ]; then
          echo "stock has single ramdisk.cpio, concatenating platform + recovery"
          cat /tmp/patch/platform.cpio /tmp/patch/recovery.cpio > "$STOCK_CPIO"
        else
          echo "Could not find any ramdisk in stock vendor_boot"
          exit 1
        fi

        (cd "$WORK/stock" && $MAGISKBOOT repack "$STOCK_VB" "$OUTDIR/vendor_boot_patched.img") 2>&1
        if [ ! -f "$OUTDIR/vendor_boot_patched.img" ]; then
          echo "magiskboot repack did not produce vendor_boot_patched.img"
          exit 1
        fi
        echo "PATCHED_VB=$OUTDIR/vendor_boot_patched.img" >> $GITHUB_ENV
        rm -rf "$WORK"

    - name: Upload to gofile.io
      if: inputs.GOFILE_UPLOAD == 'true'
      run: |
        for f in ${{ env.FOUND_IMGS }}; do
          if [ -f "$f" ]; then
            fname=$(basename "$f")
            server=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null || echo "store9")
            response=$(curl -s -F "file=@$f" "https://$server.gofile.io/uploadFile")
            link=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])" 2>/dev/null || echo "Upload failed")
            echo "$fname -> $link"
          fi
        done
        if [ -f "${{ env.PATCHED_VB }}" ]; then
          server=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null || echo "store9")
          response=$(curl -s -F "file=@${{ env.PATCHED_VB }}" "https://$server.gofile.io/uploadFile")
          link=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])" 2>/dev/null || echo "Upload failed")
          echo "vendor_boot_patched.img -> $link"
        fi
        echo "Uploading zip files..."
        for f in $(find "${{ env.OUT_DIR }}" -maxdepth 2 -name "*.zip" -type f 2>/dev/null); do
          if [ -f "$f" ]; then
            fname=$(basename "$f")
            server=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null || echo "store9")
            response=$(curl -s -F "file=@$f" "https://$server.gofile.io/uploadFile")
            link=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])" 2>/dev/null || echo "Upload failed")
            echo "$fname -> $link"
          fi
        done

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      continue-on-error: true
      uses: softprops/action-gh-release@v2.3.0
      with:
        files: |
          ${{ env.RELEASE_IMG }}
          ${{ env.RELEASE_ZIP }}
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/vendor_boot_patched.img
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/ramdisk-recovery.*
        name: Unofficial OrangeFox for ${{ env.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        token: ${{ secrets.RECOVERY_TOKEN }}
        body: |
          Build: ${{ inputs.MANIFEST_BRANCH }}
          Device: [Device Tree/Branch](${{ inputs.DEVICE_TREE }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ inputs.DEVICE_TREE }}/commit/${{ env.COMMIT_ID }}) during building.
          MD5 (img): ${{ env.MD5_IMG }}
          MD5 (zip): ${{ env.MD5_ZIP }}
          PATCH_RAMDISK: ${{ inputs.PATCH_RAMDISK }}
          
    - name: Run LDCheck
      if: inputs.LDCHECK == 'true'
      run: |
        cd tools
        mv -n libneeds ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery/root/
        mv -n ldcheck ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery/root/
        cd ../OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery/root
        python3 ldcheck -p system/lib64:vendor/lib64:system/lib:vendor/lib -d ${{ inputs.LDCHECKPATH }}
        echo "Done checking missing dependencies. Review, and reconfigure your tree."
      continue-on-error: true
